<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pack Your Bag</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="intro-screen" class="intro-screen">
    <div class="intro-content">
      <svg class="trace-logo" viewBox="0 0 900 220" aria-label="THTLabs logo">
        <text x="50%" y="52%" dominant-baseline="middle" text-anchor="middle">THTLabs</text>
      </svg>
      <svg class="trace-subtitle" viewBox="0 0 700 130" aria-label="By Matei subtitle">
        <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle">By Matei</text>
      </svg>
      <p id="typed-line" class="typed-line" aria-live="polite"></p>
      <button id="start-btn" class="start-btn hidden">Start Game</button>
    </div>
  </div>

  <main id="game-screen" class="game-screen hidden">
    <header class="hud">
      <div class="hud-box">
        <span class="hud-label">Lesson</span>
        <strong id="lesson-name">-</strong>
      </div>
      <div class="hud-box">
        <span class="hud-label">Time</span>
        <strong><span id="timer">0</span>s</strong>
      </div>
      <div class="hud-box">
        <span class="hud-label">Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="hud-box">
        <span class="hud-label">Round</span>
        <strong id="round-indicator">0/0</strong>
      </div>
    </header>

    <section class="play-area">
      <section class="items-panel">
        <h2>Drag the correct items</h2>
        <p class="panel-note">Pack only what you need for this lesson.</p>
        <div id="items-grid" class="items-grid"></div>
      </section>

      <section class="bag-panel">
        <h2>School Bag</h2>
        <div id="bag-dropzone" class="bag-dropzone">
          <p class="bag-hint">Drop items here</p>
          <div id="bag-items" class="bag-items"></div>
        </div>
        <div class="controls">
          <button id="submit-round-btn" class="action-btn">Submit Round</button>
        </div>
      </section>
    </section>

    <section class="feedback-row">
      <div id="feedback" class="feedback">Choose carefully and beat the timer!</div>
    </section>
  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
